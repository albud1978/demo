// ─── QUANTUM MECHANICS ───
const AUFBAU = [[1,0],[2,0],[2,1],[3,0],[3,1],[4,0],[3,2],[4,1],[5,0],[4,2],[5,1],[6,0],[4,3],[5,2],[6,1],[7,0],[5,3],[6,2],[7,1]];
const SUB_NAMES = ["s","p","d","f"];
const SUB_MAX = [2,6,10,14];
const SUB_COLORS = { s:"#5BC0EB", p:"#9BC53D", d:"#FFA62B", f:"#E55934" };

function getElectronFilling(z) {
  const cfg = []; let rem = z;
  for (const [n,l] of AUFBAU) {
    if (rem <= 0) break;
    const mx = SUB_MAX[l];
    const el = Math.min(rem, mx);
    cfg.push({ n, l, electrons: el, max: mx, label: `${n}${SUB_NAMES[l]}` });
    rem -= el;
  }
  return cfg;
}

function getQuantumNumbers(z) {
  const cfg = getElectronFilling(z);
  const last = cfg[cfg.length - 1];
  const { n, l, electrons } = last;
  const totalOrb = 2*l + 1;
  const mlVals = []; for (let i = -l; i <= l; i++) mlVals.push(i);
  let ml, ms;
  if (electrons <= totalOrb) { ml = mlVals[electrons - 1]; ms = "+½"; }
  else { ml = mlVals[electrons - totalOrb - 1]; ms = "−½"; }
  return { n, l, ml, ms, subshell: `${n}${SUB_NAMES[l]}`, lName: SUB_NAMES[l] };
}

function getShells(z) {
  const mx = [2,8,18,32,32,18,8], sh = []; let rem = z;
  for (let i = 0; i < mx.length && rem > 0; i++) { const n = Math.min(rem, mx[i]); sh.push(n); rem -= n; }
  return sh;
}

// ─── 3D ORBITAL SHAPE ───
// Angular probability functions (squared spherical harmonics)
function angularProb(l, m, cosTheta, sinTheta, phi) {
  const ct = cosTheta, st = sinTheta;
  if (l === 0) return 1.0; // s — perfect sphere

  if (l === 1) { // p orbitals
    if (m === 0) return ct * ct;                          // pz: two lobes along z
    if (m === 1) return st * st * Math.cos(phi) ** 2;     // px
    return st * st * Math.sin(phi) ** 2;                  // py (m=-1)
  }

  if (l === 2) { // d orbitals
    if (m === 0) return (3*ct*ct - 1) ** 2 / 4;                          // dz²: donut + two caps
    if (m === 1) return st*st * ct*ct * Math.cos(phi) ** 2 * 4;          // dxz
    if (m === -1) return st*st * ct*ct * Math.sin(phi) ** 2 * 4;         // dyz
    if (m === 2) return st**4 * Math.cos(2*phi) ** 2;                    // dx²-y²
    return st**4 * Math.sin(2*phi) ** 2;                                 // dxy (m=-2)
  }

  // f orbitals (l=3) — simplified but recognizable
  if (m === 0) return ct*ct * (5*ct*ct - 3) ** 2 / 4;                                   // fz³
  if (Math.abs(m) === 1) return st*st * (5*ct*ct - 1) ** 2 / 4;                         // fxz², fyz²
  if (Math.abs(m) === 2) return st**4 * ct*ct * 4;                                      // fxyz, fz(x²-y²)
  return st**6;                                                                          // fx(x²-3y²), fy(3x²-y²)
}

function OrbitalView({ l, m, accentColor }) {
  const ref = useRef(null);
  const cleanRef = useRef(null);

  useEffect(() => {
    const c = ref.current; if (!c) return;
    if (cleanRef.current) cleanRef.current();
    const w = c.clientWidth, h = c.clientHeight;
    if (!w || !h) return;

    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
    cam.position.set(0, 0, 5.5);
    const ren = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    ren.setSize(w, h); ren.setPixelRatio(Math.min(devicePixelRatio, 2)); ren.setClearColor(0,0);
    c.appendChild(ren.domElement);

    const accent = new THREE.Color(accentColor);
    const group = new THREE.Group();
    scene.add(group);

    // Sharper probability cloud with recognizable lobe shapes
    const count = l === 0 ? 4000 : l === 1 ? 5000 : l === 2 ? 7000 : 8000;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    let idx = 0;

    // Radial shell parameters — thin concentrated shell, not diffuse blob
    const rPeak = 1.3 + l * 0.15;     // peak radius of radial probability
    const rWidth = 0.25 + l * 0.05;   // shell thickness (thin!)

    const maxAttempts = count * 12;
    for (let a = 0; a < maxAttempts && idx < count; a++) {
      const theta = Math.acos(2 * Math.random() - 1);
      const phi = Math.random() * Math.PI * 2;
      const ct = Math.cos(theta), st = Math.sin(theta);

      // Angular probability — raise to power for SHARP lobes
      let angP = angularProb(l, m, ct, st, phi);
      // Sharpen: raise to power 2-3 to make lobes crisp with dark nodal zones
      const sharpness = l === 0 ? 1 : l === 1 ? 2.5 : l === 2 ? 3 : 3.5;
      angP = Math.pow(angP, sharpness);

      // Reject low-probability regions — this creates the shape
      if (Math.random() > angP) continue;

      // Radial: Gaussian shell around rPeak
      const rRand = rPeak + (Math.random() - 0.5) * 2 * rWidth * (0.5 + 0.8 * Math.random());
      if (rRand < 0.15) continue;

      // Scale radius by angular probability — denser lobes extend further
      const r = rRand * (0.7 + 0.5 * Math.sqrt(angP));

      let x = r * st * Math.cos(phi);
      let y = r * st * Math.sin(phi);
      let z = r * ct;

      const i3 = idx * 3;
      positions[i3] = x; positions[i3+1] = y; positions[i3+2] = z;

      // Color: hot core → cooler edges
      const dist = Math.sqrt(x*x + y*y + z*z);
      const bright = 0.4 + 0.6 * Math.max(0, 1 - dist / (rPeak * 2));
      const warmth = Math.pow(angP, 0.3); // high-probability = warmer color
      colors[i3]   = accent.r * bright * (0.6 + 0.4 * warmth) + (1-bright) * 0.08;
      colors[i3+1] = accent.g * bright * (0.5 + 0.5 * warmth) + (1-bright) * 0.05;
      colors[i3+2] = accent.b * bright * (0.4 + 0.6 * warmth) + (1-bright) * 0.03;
      idx++;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions.slice(0, idx*3), 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors.slice(0, idx*3), 3));

    const mat = new THREE.PointsMaterial({
      size: 0.03, vertexColors: true, transparent: true, opacity: 0.8,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    group.add(new THREE.Points(geo, mat));

    // Nodal plane hints — semi-transparent discs where ψ = 0
    if (l >= 1) {
      const planeGeo = new THREE.RingGeometry(0.1, 2.2, 64);
      const planeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.03, side: THREE.DoubleSide });
      if (l === 1 && m === 0) { // pz: nodal plane at z=0
        const plane = new THREE.Mesh(planeGeo, planeMat);
        group.add(plane);
      }
      if (l === 2 && m === 0) { // dz²: nodal cone hint
        const cone1 = new THREE.Mesh(planeGeo, planeMat);
        cone1.rotation.x = Math.acos(1/Math.sqrt(3));
        group.add(cone1);
      }
    }

    // Axis labels
    const axColors = [0xff4444, 0x44ff44, 0x4488ff];
    const axLabels = ["x","y","z"];
    [[1,0,0],[0,1,0],[0,0,1]].forEach(([ax,ay,az], i) => {
      const pts = [new THREE.Vector3(-2*ax,-2*ay,-2*az), new THREE.Vector3(2*ax,2*ay,2*az)];
      const g = new THREE.BufferGeometry().setFromPoints(pts);
      group.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: axColors[i], transparent: true, opacity: 0.12 })));
    });

    // Small nucleus dot
    group.add(new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 })
    ));

    let mx2 = 0, my2 = 0, t = 0, animId;
    const onMove = e => {
      const rect = c.getBoundingClientRect();
      mx2 = ((e.clientX - rect.left)/w - 0.5)*2;
      my2 = ((e.clientY - rect.top)/h - 0.5)*2;
    };
    c.addEventListener('mousemove', onMove);

    const anim = () => {
      animId = requestAnimationFrame(anim);
      t += 0.008;
      group.rotation.y += (mx2*0.8 - group.rotation.y)*0.04;
      group.rotation.x += (-my2*0.5 - group.rotation.x)*0.04;
      group.rotation.y += 0.002;
      mat.opacity = 0.65 + 0.15 * Math.sin(t * 2.5);
      ren.render(scene, cam);
    };
    anim();

    cleanRef.current = () => {
      cancelAnimationFrame(animId);
      c.removeEventListener('mousemove', onMove);
      ren.dispose();
      if (ren.domElement.parentNode === c) c.removeChild(ren.domElement);
    };
    return () => { if (cleanRef.current) cleanRef.current(); };
  }, [l, m, accentColor]);

  return <div ref={ref} style={{ width:"100%", height:180, borderRadius:6, cursor:"grab",
    background:`radial-gradient(ellipse at center, ${accentColor}15 0%, transparent 70%)` }} />;
}

// ─── 3D ATOM MODEL ───
function Atom3D({ element, accentColor }) {
  const ref = useRef(null);
  const cleanRef = useRef(null);

  useEffect(() => {
    const c = ref.current; if (!c) return;
    if (cleanRef.current) cleanRef.current();
    const w = c.clientWidth, h = c.clientHeight;
    if (!w || !h) return;

    const accent = new THREE.Color(accentColor);
    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(50, w/h, 0.1, 100);
    cam.position.set(0, 0, 7);
    const ren = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    ren.setSize(w, h); ren.setPixelRatio(Math.min(devicePixelRatio, 2)); ren.setClearColor(0,0);
    c.appendChild(ren.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.35));
    const l1 = new THREE.PointLight(0xffffff, 1, 50); l1.position.set(5,5,5); scene.add(l1);
    const l2 = new THREE.PointLight(accent.getHex(), 0.5, 50); l2.position.set(-4,-3,4); scene.add(l2);

    const group = new THREE.Group(); scene.add(group);
    const nS = 0.28 + Math.min(element.z*0.003, 0.22);
    const nucleus = new THREE.Mesh(new THREE.SphereGeometry(nS,32,32),
      new THREE.MeshPhongMaterial({color:accent,emissive:accent,emissiveIntensity:0.5,shininess:120,transparent:true,opacity:0.92}));
    group.add(nucleus);
    group.add(new THREE.Mesh(new THREE.SphereGeometry(nS*1.5,24,24), new THREE.MeshBasicMaterial({color:accent,transparent:true,opacity:0.1})));

    const bN = Math.min(element.z, 20);
    for (let i=0;i<bN;i++){
      const phi=Math.acos(1-2*(i+.5)/bN), theta=Math.PI*(1+Math.sqrt(5))*i;
      const b=new THREE.Mesh(new THREE.SphereGeometry(nS*0.28,8,8),
        new THREE.MeshPhongMaterial({color:i%2?new THREE.Color(accent).lerp(new THREE.Color(0xffffff),0.5):accent,emissive:i%2?new THREE.Color(0x888888):accent,emissiveIntensity:0.3,shininess:80}));
      b.position.set(nS*.85*Math.sin(phi)*Math.cos(theta),nS*.85*Math.sin(phi)*Math.sin(theta),nS*.85*Math.cos(phi));
      group.add(b);
    }

    const shells = getShells(element.z);
    const maxR = 1 + shells.length * 0.55, scl = 3/maxR;
    const allE = [];
    shells.forEach((eC,si)=>{
      const radius = (1+si*0.55)*scl;
      const rN = Math.min(Math.ceil(eC/2),5);
      for(let r=0;r<rN;r++){
        const ring=new THREE.Mesh(new THREE.TorusGeometry(radius,0.006,6,128),new THREE.MeshBasicMaterial({color:accent,transparent:true,opacity:0.08+si*0.02}));
        ring.rotation.x=(Math.PI/(rN+1))*(r+1)+si*0.15; ring.rotation.y=(r*Math.PI)/rN+si*0.25; group.add(ring);
      }
      for(let e=0;e<eC;e++){
        const em=new THREE.Mesh(new THREE.SphereGeometry(0.055,12,12),new THREE.MeshPhongMaterial({color:0xffffff,emissive:accent,emissiveIntensity:0.9,shininess:200}));
        em.add(new THREE.Mesh(new THREE.SphereGeometry(0.09,8,8),new THREE.MeshBasicMaterial({color:accent,transparent:true,opacity:0.25})));
        group.add(em);
        allE.push({mesh:em,radius,angle:(e/eC)*Math.PI*2,tiltX:Math.PI*((e%3)/3)+si*0.2,tiltZ:(e*0.618+si*1.1)%Math.PI,speed:0.5+0.8/(si+1)+e*0.03});
      }
    });

    let mx2=0,my2=0,t=0,animId;
    const onMove=ev=>{const rect=c.getBoundingClientRect();mx2=((ev.clientX-rect.left)/w-0.5)*2;my2=((ev.clientY-rect.top)/h-0.5)*2;};
    c.addEventListener('mousemove',onMove);
    const anim=()=>{
      animId=requestAnimationFrame(anim); t+=0.016;
      group.rotation.y+=(mx2*0.6-group.rotation.y)*0.04;
      group.rotation.x+=(-my2*0.4-group.rotation.x)*0.04;
      const p=1+Math.sin(t*2.5)*0.03; nucleus.scale.set(p,p,p);
      allE.forEach(ed=>{
        ed.angle+=ed.speed*0.016; const a=ed.angle,r=ed.radius;
        const cx=Math.cos(ed.tiltX),sx=Math.sin(ed.tiltX),cz=Math.cos(ed.tiltZ),sz=Math.sin(ed.tiltZ);
        const x0=r*Math.cos(a),y0=r*Math.sin(a);
        ed.mesh.position.set(x0*cx,y0*cz+x0*sx*sz*0.4,x0*sx*cz*0.6-y0*sz*0.4);
      });
      ren.render(scene,cam);
    };
    anim();
    cleanRef.current=()=>{cancelAnimationFrame(animId);c.removeEventListener('mousemove',onMove);ren.dispose();if(ren.domElement.parentNode===c)c.removeChild(ren.domElement);};
    return ()=>{if(cleanRef.current)cleanRef.current();};
  },[element.z,accentColor]);

  return <div ref={ref} style={{width:"100%",height:180,borderRadius:6,cursor:"grab",
    background:`radial-gradient(ellipse at center, ${accentColor}11 0%, transparent 70%)`}} />;
}

// ─── AUFBAU DIAGRAM ───
function AufbauDiagram({ z, accentColor }) {
  const filling = getElectronFilling(z);
  return (
    <div style={{ display:"flex", flexWrap:"wrap", gap:3, padding:"6px 0" }}>
      {filling.map((sub, i) => {
        const orbCount = (2*sub.l+1);
        const isFull = sub.electrons === sub.max;
        const isLast = i === filling.length - 1;
        const sc = SUB_COLORS[SUB_NAMES[sub.l]];
        return (
          <div key={i} style={{
            border: `1px solid ${isLast ? accentColor : sc}${isLast ? 'aa' : '44'}`,
            borderRadius: 4, padding: "2px 4px",
            background: isLast ? accentColor + '22' : 'transparent',
          }}>
            <div style={{ fontSize:8, color: sc, fontWeight:600, textAlign:"center", marginBottom:1 }}>{sub.label}</div>
            <div style={{ display:"flex", gap:1 }}>
              {Array.from({length: orbCount}).map((_, oi) => {
                const eInOrb = Math.min(2, Math.max(0, sub.electrons - oi * 2 + (sub.electrons > orbCount ? orbCount : 0)));
                // Hund's rule: first fill one up, then pair
                let up = false, dn = false;
                if (sub.electrons <= orbCount) {
                  up = oi < sub.electrons; dn = false;
                } else {
                  up = true; dn = oi < (sub.electrons - orbCount);
                }
                return (
                  <div key={oi} style={{
                    width: 12, height: 18, border: `1px solid ${sc}44`,
                    borderRadius: 2, display:"flex", flexDirection:"column",
                    alignItems:"center", justifyContent:"center", fontSize: 8,
                    background: (up||dn) ? sc+'11' : 'transparent',
                  }}>
                    {up && <span style={{color:sc,lineHeight:1}}>↑</span>}
                    {dn && <span style={{color:sc,lineHeight:1}}>↓</span>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── CONSTANTS ───
const CELL = 56, GAP = 2;
const STL = {solid:"Твёрдое",liquid:"Жидкость",gas:"Газ",unknown:"Неизв."};
const STI = {solid:"■",liquid:"◉",gas:"○",unknown:"?"};

// ─── MAIN COMPONENT ───
function PeriodicTable() {
  const [selected, setSelected] = useState(null);
  const [hovCat, setHovCat] = useState(null);
  const [search, setSearch] = useState("");
  const [tempK, setTempK] = useState(293);
  const [tab, setTab] = useState("atom"); // "atom" | "orbital" | "aufbau"
  const [orbIdx, setOrbIdx] = useState(-1); // index into filling array, -1 = last

  const stateAt = (el) => {
    if(el.mp===null&&el.bp===null)return"unknown";
    const t=tempK-273.15;
    if(el.mp!==null&&t<el.mp)return"solid";
    if(el.bp!==null&&t>el.bp)return"gas";
    if(el.mp!==null&&el.bp!==null&&t>=el.mp&&t<=el.bp)return"liquid";
    if(el.mp!==null&&el.bp===null&&t>=el.mp)return"liquid";
    return el.st;
  };
  const match = (el) => {
    if(!search) return true; const q=search.toLowerCase();
    return el.n.toLowerCase().includes(q)||el.en.toLowerCase().includes(q)||el.s.toLowerCase().includes(q)||String(el.z).includes(q);
  };

  const sel = selected ? EL.find(e=>e.z===selected) : null;
  const shells = sel ? getShells(sel.z) : [];

  return (
    <div style={{fontFamily:"'JetBrains Mono',monospace",background:"#0a0e17",color:"#e0e6f0",minHeight:"100vh",padding:12,boxSizing:"border-box",overflow:"auto"}}>
      <style>{`

        .ec{transition:all .15s;cursor:pointer;position:relative}.ec:hover{transform:scale(1.35);z-index:20;box-shadow:0 0 20px rgba(255,255,255,.2)}
        .lc{cursor:pointer;transition:all .15s;padding:3px 8px;border-radius:4px;font-size:10px;white-space:nowrap}.lc:hover{transform:scale(1.05)}
        .dp{animation:si .25s ease}@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .ts{-webkit-appearance:none;width:100px;height:4px;border-radius:2px;background:linear-gradient(to right,#3B9FD9,#E8485C);outline:none}
        .ts::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 6px rgba(255,255,255,.5)}
        .si{background:#141a2a;border:1px solid #2a3050;color:#e0e6f0;padding:5px 10px;border-radius:6px;font-family:inherit;font-size:12px;outline:none;width:160px}
        .si:focus{border-color:#3B9FD9;box-shadow:0 0 8px rgba(59,159,217,.3)}.si::placeholder{color:#4a5580}
        .tab-btn{padding:4px 10px;border-radius:4px;font-size:9px;font-family:inherit;cursor:pointer;border:1px solid #2a3050;transition:all .15s;font-weight:500}
      `}</style>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"baseline",gap:10}}>
          <h1 style={{fontSize:18,fontWeight:700,letterSpacing:"0.05em",color:"#fff"}}>ПЕРИОДИЧЕСКАЯ ТАБЛИЦА</h1>
          <span style={{fontSize:11,color:"#4a5580",fontWeight:300}}>118 элементов · квантовая модель</span>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <input className="si" placeholder="Поиск..." value={search} onChange={e=>setSearch(e.target.value)} />
          <div style={{display:"flex",alignItems:"center",gap:6,background:"#141a2a",padding:"4px 10px",borderRadius:6,border:"1px solid #2a3050"}}>
            <span style={{fontSize:10,color:"#4a5580"}}>T:</span>
            <input className="ts" type="range" min={0} max={6000} value={tempK} onChange={e=>setTempK(+e.target.value)} />
            <span style={{fontSize:11,fontWeight:600,minWidth:50}}>{tempK} K</span>
          </div>
        </div>
      </div>

      {/* Legend */}
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
        {Object.entries(CAT).map(([k,v])=>(
          <div key={k} className="lc" style={{background:hovCat===k?v.c+'44':v.c+'18',border:`1px solid ${v.c}55`,color:v.c,fontWeight:hovCat===k?600:400}}
            onMouseEnter={()=>setHovCat(k)} onMouseLeave={()=>setHovCat(null)}>{v.l}</div>
        ))}
        <div style={{display:"flex",gap:8,marginLeft:12,alignItems:"center",fontSize:10,color:"#4a5580"}}>
          {Object.entries(STL).map(([k,v])=><span key={k}>{STI[k]} {v}</span>)}
        </div>
      </div>

      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        {/* Grid */}
        <div style={{position:"relative"}}>
          {[1,2,3,4,5,6,7].map(r=><div key={r} style={{position:"absolute",left:-14,top:(r-1)*(CELL+GAP)+CELL/2-5,fontSize:9,color:"#2a3050",fontWeight:600}}>{r}</div>)}
          {Array.from({length:18},(_,i)=>i+1).map(c=><div key={c} style={{position:"absolute",left:(c-1)*(CELL+GAP)+CELL/2-5,top:-13,fontSize:8,color:"#2a3050",fontWeight:600,textAlign:"center",width:10}}>{c}</div>)}
          <div style={{display:"grid",gridTemplateColumns:`repeat(18,${CELL}px)`,gridTemplateRows:`repeat(7,${CELL}px) 12px repeat(2,${CELL}px)`,gap:`${GAP}px`,marginTop:2,marginLeft:2}}>
            {EL.map(el=>{
              const cat=CAT[el.cat];const dim=(hovCat&&el.cat!==hovCat)||(search&&!match(el));const isSel=selected===el.z;const cs=stateAt(el);
              return(
                <div key={el.z} className="ec" onClick={()=>{setSelected(isSel?null:el.z);setTab("atom");setOrbIdx(-1);}}
                  style={{gridRow:el.r<=7?el.r:el.r===9?9:10,gridColumn:el.co,width:CELL,height:CELL,
                    background:isSel?cat.c+'55':cat.c+(dim?'08':'1a'),border:`1px solid ${cat.c}${dim?'15':isSel?'aa':'44'}`,
                    borderRadius:3,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:dim?0.25:1,padding:1}}>
                  <span style={{fontSize:7,color:cat.c+(dim?'66':'bb'),fontWeight:300,lineHeight:1}}>{el.z}</span>
                  <span style={{fontSize:16,fontWeight:700,color:dim?"#334":cat.c,lineHeight:1.1}}>{el.s}</span>
                  <span style={{fontSize:6,color:"#7788aa",lineHeight:1,maxWidth:CELL-4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{el.n}</span>
                  <span style={{fontSize:6,color:"#4a5580",lineHeight:1}}>{el.m}</span>
                  <span style={{fontSize:6,position:"absolute",top:2,right:3,color:cs==="gas"?"#6ec":cs==="liquid"?"#6af":cs==="solid"?"#aaa":"#555"}}>{STI[cs]}</span>
                </div>
              );
            })}
          </div>
          <div style={{position:"absolute",top:7*(CELL+GAP)+14,left:-2,fontSize:8,color:CAT.lanthanide.c,fontWeight:500}}>La–Lu</div>
          <div style={{position:"absolute",top:8*(CELL+GAP)+14+CELL,left:-2,fontSize:8,color:CAT.actinide.c,fontWeight:500}}>Ac–Lr</div>
        </div>

        {/* Detail Panel */}
        {sel && (()=>{
          const cc = CAT[sel.cat].c;
          return (
            <div className="dp" style={{background:"#111827",border:`1px solid ${cc}44`,borderRadius:10,padding:14,minWidth:280,maxWidth:320,alignSelf:"flex-start",position:"sticky",top:12}}>
              {/* Header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div>
                  <div style={{fontSize:10,color:cc,fontWeight:500,marginBottom:2}}>{CAT[sel.cat].l}</div>
                  <div style={{fontSize:36,fontWeight:700,color:cc,lineHeight:1}}>{sel.s}</div>
                  <div style={{fontSize:14,fontWeight:600,marginTop:2}}>{sel.n}</div>
                  <div style={{fontSize:11,color:"#4a5580"}}>{sel.en}</div>
                </div>
                <div style={{background:cc+'22',borderRadius:6,padding:"6px 10px",textAlign:"center"}}>
                  <div style={{fontSize:22,fontWeight:700,color:"#fff"}}>{sel.z}</div>
                  <div style={{fontSize:8,color:"#4a5580"}}>Номер</div>
                </div>
              </div>

              {/* Tabs */}
              <div style={{display:"flex",gap:4,marginBottom:8}}>
                {[["atom","Атом"],["orbital","Орбиталь"],["aufbau","Заполнение"]].map(([k,label])=>(
                  <button key={k} className="tab-btn" onClick={()=>setTab(k)}
                    style={{background:tab===k?cc+'33':'#141a2a',color:tab===k?cc:'#4a5580',borderColor:tab===k?cc+'66':'#2a3050'}}>
                    {label}
                  </button>
                ))}
              </div>

              {/* Tab Content */}
              {tab === "atom" && (
                <div style={{marginBottom:8,borderRadius:6,overflow:"hidden",border:`1px solid ${cc}22`}}>
                  <Atom3D key={sel.z} element={sel} accentColor={cc} />
                  <div style={{display:"flex",justifyContent:"center",gap:4,padding:"5px 8px",background:"#0a0e17cc",flexWrap:"wrap"}}>
                    {shells.map((cnt,i)=>(
                      <div key={i} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:22,height:22,borderRadius:"50%",fontSize:10,fontWeight:600,padding:"0 4px",background:cc+'22',color:cc,border:`1px solid ${cc}44`}}>{cnt}</div>
                    ))}
                    <span style={{fontSize:8,color:"#4a5580",alignSelf:"center",marginLeft:4}}>e⁻ по оболочкам</span>
                  </div>
                </div>
              )}

              {tab === "orbital" && (()=>{
                const filling = getElectronFilling(sel.z);
                // Get unique subshell types present: collect one representative per (l) type
                // But show ALL subshells so user can browse
                const activeIdx = orbIdx >= 0 && orbIdx < filling.length ? orbIdx : filling.length - 1;
                const activeSub = filling[activeIdx];
                const activeL = activeSub.l;
                const activeLName = SUB_NAMES[activeL];
                const activeColor = SUB_COLORS[activeLName];
                // Pick m value: default m=0 for nice canonical shape
                const activeM = 0;
                // Quantum numbers for selected subshell
                const totalOrb = 2*activeL + 1;
                const mlVals = []; for(let i=-activeL;i<=activeL;i++) mlVals.push(i);
                const orbShapeDesc = {
                  0: "Сферическое облако. Вероятность одинакова во всех направлениях.",
                  1: "Гантель — два лепестка вдоль оси. Узловая плоскость посередине (ψ=0).",
                  2: "Четыре лепестка в перпендикулярных плоскостях. Две узловые плоскости.",
                  3: "6–8 лепестков сложной формы. Три узловые плоскости.",
                };

                return (
                <div style={{marginBottom:8}}>
                  {/* Subshell selector chips */}
                  <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>
                    {filling.map((sub,i)=>{
                      const sc = SUB_COLORS[SUB_NAMES[sub.l]];
                      const isActive = i === activeIdx;
                      return (
                        <button key={i} onClick={()=>setOrbIdx(i)} className="tab-btn"
                          style={{
                            background: isActive ? sc+'44' : sc+'11',
                            color: isActive ? "#fff" : sc,
                            borderColor: isActive ? sc : sc+'33',
                            fontSize: 10, padding:"3px 7px",
                            boxShadow: isActive ? `0 0 8px ${sc}44` : 'none',
                          }}>
                          {sub.label}<sup style={{fontSize:7,marginLeft:1}}>{sub.electrons}</sup>
                        </button>
                      );
                    })}
                  </div>

                  {/* 3D Orbital Cloud */}
                  <div style={{borderRadius:6,overflow:"hidden",border:`1px solid ${activeColor}44`,marginBottom:8}}>
                    <OrbitalView key={`${sel.z}-${activeIdx}-${activeL}-${activeM}`} l={activeL} m={activeM} accentColor={activeColor} />
                    <div style={{textAlign:"center",padding:"6px",background:"#0a0e17cc",fontSize:10}}>
                      <span style={{color:activeColor,fontWeight:700,fontSize:16}}>{activeSub.label}</span>
                      <sup style={{color:activeColor,fontSize:10}}>{activeSub.electrons}</sup>
                      <span style={{color:"#6a7a90",marginLeft:8,fontSize:9}}>
                        {activeL===0?"● сфера":activeL===1?"∞ гантель · 2 лепестка":activeL===2?

                      </span>
                    </div>
                    <div style={{padding:"4px 8px",fontSize:8,color:"#3a4a60",background:"#0a0e17cc",borderTop:"1px solid #1a2030",lineHeight:1.4}}>

                  {/* Quantum Numbers for this subshell */}
                  <div style={{background:"#0a0e17",borderRadius:6,padding:8,border:`1px solid ${activeColor}22`}}>
                    <div style={{fontSize:9,color:"#4a5580",marginBottom:6,fontWeight:600,letterSpacing:"0.05em"}}>
                      КВАНТОВЫЕ ЧИСЛА · {activeSub.label} · {activeSub.electrons}/{activeSub.max} e⁻

                      {[

                        <div key={i} style={{background:"#141a2a",borderRadius:4,padding:"5px 7px",border:`1px solid ${activeColor}15`}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                            <span style={{fontSize:14,fontWeight:700,color:activeColor}}>{sym}</span>
                            <span style={{fontSize:12,fontWeight:600,color:"#e0e6f0"}}>{val}</span>
                          </div>

                        </div>
                      ))}
                    </div>
                    <div style={{marginTop:6,fontSize:8,color:"#3a4a60",lineHeight:1.4}}>
                      Макс. электронов: {activeSub.max} = {totalOrb} орбитал{totalOrb===1?"ь":totalOrb<5?"и":"ей"} × 2 спина.
                      {activeSub.electrons < activeSub.max ? ` Заполнена частично: ${activeSub.electrons}/${activeSub.max}.` : " Подоболочка заполнена полностью."}
                    </div>
                  </div>

                  {/* Shape legend */}
                  <div style={{display:"flex",gap:5,marginTop:8,justifyContent:"center",flexWrap:"wrap"}}>
                    {[["s","●","сфера",0],["p","∞","гантель",1],["d","✦","клевер",2],["f","❋","мульти",3]].map(([name,icon,desc,ll])=>{
                      const hasIt = filling.some(f=>f.l===ll);
                      return (
                        <div key={name} style={{display:"flex",alignItems:"center",gap:3,padding:"2px 6px",borderRadius:3,
                          background: hasIt ? SUB_COLORS[name]+'22' : '#0e1320',
                          border:`1px solid ${hasIt ? SUB_COLORS[name]+'55' : '#1a2030'}`,
                          opacity: hasIt ? 1 : 0.35}}>
                          <span style={{fontSize:10,color:SUB_COLORS[name]}}>{icon}</span>
                          <span style={{fontSize:9,color:SUB_COLORS[name],fontWeight:600}}>{name}</span>
                          <span style={{fontSize:7,color:"#4a5580"}}>{desc}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
                );
              })()}

              {tab === "aufbau" && (
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,color:"#4a5580",marginBottom:4,fontWeight:600,letterSpacing:"0.05em"}}>ЗАПОЛНЕНИЕ ПО ПРАВИЛУ АУФБАУ (КЛЕЧКОВСКОГО)</div>
                  <AufbauDiagram z={sel.z} accentColor={cc} />
                  <div style={{fontSize:8,color:"#4a5580",marginTop:4}}>
                    ↑↓ = спаренные e⁻ · ↑ = неспаренный · Правило Хунда: сначала по одному
                  </div>
                </div>
              )}

              {/* Config */}
              <div style={{fontSize:11,color:"#8899aa",marginBottom:8,fontFamily:"monospace",background:"#0a0e17",padding:"4px 8px",borderRadius:4}}>{sel.cfg}</div>

              {/* Properties */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 10px",fontSize:11}}>
                {[
                  ["Масса",sel.m+" а.е.м."],["Состояние",STL[sel.st]],
                  ["Плотность",sel.den?sel.den+" г/см³":"—"],["Т. плавл.",sel.mp!==null?sel.mp+"°C":"—"],
                  ["Т. кипения",sel.bp!==null?sel.bp+"°C":"—"],[`При ${tempK}K`,STL[stateAt(sel)]],
                  ["Открыт",sel.yr>0?sel.yr+" г.":"Древность"],["Кем",sel.w],
                ].map(([l,v],i)=><div key={i}><div style={{fontSize:9,color:"#4a5580",marginBottom:1}}>{l}</div><div style={{fontWeight:500,color:"#c0c8d8"}}>{v}</div></div>)}
              </div>

              <button onClick={()=>setSelected(null)} style={{marginTop:10,width:"100%",padding:6,background:"#1a2035",border:"1px solid #2a3050",borderRadius:4,color:"#4a5580",fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>Закрыть ✕</button>
            </div>
          );
        })()}
      </div>
    </div>
  );
}
