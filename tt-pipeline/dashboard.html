const Badge = ({ children, color, bg }) => <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 4, fontSize: 11, fontFamily: FONT, fontWeight: 500, color, background: bg, letterSpacing: "0.02em" }}>{children}</span>;
const SectionHeader = ({ children, sub }) => <div style={{ marginBottom: 14 }}><div style={{ fontSize: 11, color: C.textDim, fontFamily: FONT, textTransform: "uppercase", letterSpacing: "0.08em" }}>{children}</div>{sub && <div style={{ fontSize: 11, color: C.textMuted, fontFamily: SANS, marginTop: 2 }}>{sub}</div>}</div>;
const Card = ({ children, style: s }) => <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "20px 22px", animation: "fadeIn 0.25s ease", ...s }}>{children}</div>;

const MiniChart = ({ data, dataKey, color, height = 48, label }) => { const max = Math.max(...data.map(d => d[dataKey])); const min = Math.min(...data.map(d => d[dataKey])); const range = max - min || 1; const w = 200; const pts = data.map((d, i) => `${(i / (data.length - 1)) * w},${height - ((d[dataKey] - min) / range) * (height - 8) - 4}`).join(" "); return <div><div style={{ fontSize: 10, color: C.textMuted, marginBottom: 2, fontFamily: FONT }}>{label} <span style={{ color }}>{data[data.length - 1][dataKey].toFixed(3)}</span></div><svg width={w} height={height} style={{ display: "block" }}><defs><linearGradient id={`g-${dataKey}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3" /><stop offset="100%" stopColor={color} stopOpacity="0.02" /></linearGradient></defs><polygon points={`0,${height} ${pts} ${w},${height}`} fill={`url(#g-${dataKey})`} /><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" /><circle cx={w} cy={height - ((data[data.length - 1][dataKey] - min) / range) * (height - 8) - 4} r="3" fill={color} /></svg></div>; };

const StageCard = ({ stage, isActive, onClick }) => <div onClick={onClick} style={{ background: isActive ? stage.dimColor : C.surface, border: `1px solid ${isActive ? stage.color + "55" : C.border}`, borderRadius: 8, padding: "12px 14px", cursor: "pointer", transition: "all 0.2s", position: "relative", overflow: "hidden" }}>{isActive && <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: stage.color, borderRadius: "8px 0 0 8px" }} />}<div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}><span style={{ fontSize: 16, color: stage.color, lineHeight: 1 }}>{stage.icon}</span><span style={{ fontFamily: FONT, fontSize: 13, fontWeight: 600, color: isActive ? stage.color : C.text }}>{stage.label}</span></div><div style={{ fontSize: 11, color: C.textMuted, fontFamily: SANS, lineHeight: 1.5 }}>{stage.metrics.slice(0, 2).map(m => <div key={m.k}><span style={{ color: C.textDim }}>{m.k}:</span> {m.v}</div>)}</div></div>;

const DetailPanel = ({ stage }) => { if (!stage) return null; return <Card><div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}><div style={{ width: 36, height: 36, borderRadius: 8, background: stage.dimColor, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, color: stage.color }}>{stage.icon}</div><div><div style={{ fontFamily: FONT, fontSize: 15, fontWeight: 600, color: C.text }}>{stage.label}</div><div style={{ fontSize: 11, color: C.textMuted, fontFamily: SANS }}>{"Пайплайн обработки"}</div></div></div><p style={{ fontSize: 13, color: C.textMuted, fontFamily: SANS, lineHeight: 1.65, margin: "0 0 16px", padding: "10px 12px", background: C.surfaceAlt, borderRadius: 6, borderLeft: `2px solid ${stage.color}` }}>{stage.detail}</p><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 16px" }}>{stage.metrics.map(m => <div key={m.k} style={{ padding: "5px 0", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between" }}><span style={{ fontSize: 11, color: C.textDim, fontFamily: FONT }}>{m.k}</span><span style={{ fontSize: 12, color: C.text, fontFamily: FONT, fontWeight: 500 }}>{m.v}</span></div>)}</div></Card>; };

tDim, fontFamily: FONT, textTransform: "uppercase", marginBottom: 8 }}>{"Матрицы"}</div>{a.matrices.map(m => <div key={m.m} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "4px 0", borderBottom: `1px solid ${C.border}` }}><span style={{ fontSize: 11, fontFamily: FONT, color: C.textMuted, minWidth: 120 }}>{m.m}</span><span style={{ fontSize: 11, fontFamily: FONT, color: C.text }}>{m.val}</span><span style={{ fontSize: 10, fontFamily: SANS, color: C.textDim }}>{m.note}</span></div>)}</div>}{a.steps && <div style={{ background: C.surfaceAlt, borderRadius: 8, padding: "12px 14px", marginBottom: 12 }}><div style={{ fontSize: 10, color: C.textDim, fontFamily: FONT, textTransform: "uppercase", marginBottom: 8 }}>{"Шаги алгоритма"}</div>{a.steps.map(s => <div key={s.n} style={{ display: "flex", gap: 10, padding: "6px 0", borderBottom: `1px solid ${C.border}` }}><div style={{ width: 22, height: 22, borderRadius: 6, background: a.color + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontFamily: FONT, color: a.color, fontWeight: 600, flexShrink: 0 }}>{s.n}</div><div><div style={{ fontSize: 12, fontFamily: FONT, fontWeight: 600, color: C.text }}>{s.label}</div><div style={{ fontSize: 11, fontFamily: SANS, color: C.textMuted, lineHeight: 1.5, marginTop: 2 }}>{s.desc}</div></div></div>)}</div>}{a.states && <div style={{ background: C.surfaceAlt, borderRadius: 8, padding: "12px 14px", marginBottom: 12 }}><div style={{ fontSize: 10, color: C.textDim, fontFamily: FONT, textTransform: "uppercase", marginBottom: 8 }}>{"Переходы FSM"}</div>{a.states.map(s => <div key={s.state} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: `1px solid ${C.border}` }}><Badge color={s.color} bg={s.color + "18"}>{s.state}</Badge><span style={{ fontSize: 11, fontFamily: SANS, color: C.textMuted }}>{s.trigger}</span></div>)}</div>}{a.timers && <div style={{ background: C.surfaceAlt, borderRadius: 8, padding: "12px 14px" }}><div style={{ fontSize: 10, color: C.textDim, fontFamily: FONT, textTransform: "uppercase", marginBottom: 8 }}>{"Таймеры и счётчики"}</div>{a.timers.map(t => <div key={t.t} style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 8, padding: "4px 0", borderBottom: `1px solid ${C.border}`, fontSize: 11, fontFamily: FONT }}><span style={{ color: C.text }}>{t.t}</span><span style={{ color: a.color, fontWeight: 600 }}>max={t.max}</span><span style={{ color: C.textDim, fontSize: 10 }}>{t.unit}</span></div>)}</div>}</div>}</div>)}</div>; }

    {/* TOOLS */}
    {tab === "tools" && <div style={{ animation: "fadeIn 0.25s ease" }}>
      <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>{TOOLS_SUBTABS.map(st => <button key={st.id} onClick={() => setToolsSub(st.id)} style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${toolsSub === st.id ? C.accent + "44" : C.border}`, cursor: "pointer", fontFamily: FONT, fontSize: 11, fontWeight: toolsSub === st.id ? 600 : 400, color: toolsSub === st.id ? C.accent : C.textMuted, background: toolsSub === st.id ? C.accentDim : C.surface }}>{st.label}</button>)}</div>
      {toolsSub === "libs" && <div><SectionHeader sub={"Все внешние зависимости проекта с ролями и API-вызовами из кода"}>{"Библиотеки и фреймворки"}</SectionHeader><ToolsLibraries /></div>}
      {toolsSub === "algos" && <div><SectionHeader sub={"Математические модели, FSM-логика и алгоритмы с формулами"}>{"Алгоритмы обработки"}</SectionHeader><ToolsAlgorithms /></div>}
      {toolsSub === "dataflow" && <div><SectionHeader sub={"Трансформация данных на каждом этапе: вход → обработка → выход"}>Data flow (покадровый цикл)</SectionHeader><ToolsDataFlow /></div>}
      {toolsSub === "params" && <div><SectionHeader sub={"Полная таблица параметров с источниками (код, конфиг, правила ITTF)"}>{"Справочник параметров"}</SectionHeader><ToolsParams /></div>}
    </div>}

    {/* TRAINING */}
    {tab === "training" && <Card><SectionHeader sub="yolov8n-seg · 100 epochs · dataset 466 images">Training metrics</SectionHeader><div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 20 }}>{[{ label: "mAP50 (Box)", value: "86.3%", color: C.accent }, { label: "mAP50 (Mask)", value: "82.0%", color: C.purple }, { label: "Precision (B)", value: "93.2%", color: C.blue }, { label: "Recall (B)", value: "83.9%", color: C.warn }].map(m => <div key={m.label} style={{ background: C.surfaceAlt, borderRadius: 8, padding: "12px 14px" }}><div style={{ fontSize: 10, color: C.textDim, fontFamily: FONT, marginBottom: 4 }}>{m.label}</div><div style={{ fontSize: 22, fontWeight: 700, color: m.color, fontFamily: FONT }}>{m.value}</div></div>)}</div><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}><MiniChart data={TRAINING} dataKey="mAP50B" color={C.accent} height={56} label="mAP50 (Box)" /><MiniChart data={TRAINING} dataKey="mAP50M" color={C.purple} height={56} label="mAP50 (Mask)" /><MiniChart data={TRAINING} dataKey="boxLoss" color={C.err} height={56} label="Box loss" /><MiniChart data={TRAINING} dataKey="segLoss" color={C.warn} height={56} label="Seg loss" /></div><div style={{ marginTop: 20, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}><div style={{ background: C.surfaceAlt, borderRadius: 6, padding: "10px 12px" }}><div style={{ fontSize: 10, color: C.textDim, fontFamily: FONT }}>Dataset split</div><div style={{ marginTop: 6, display: "flex", gap: 10 }}>{[{ l: "Train", v: 406, c: C.accent }, { l: "Valid", v: 40, c: C.purple }, { l: "Test", v: 20, c: C.blue }].map(d => <div key={d.l} style={{ display: "flex", alignItems: "baseline", gap: 4 }}><span style={{ width: 6, height: 6, borderRadius: "50%", background: d.c, display: "inline-block" }} /><span style={{ fontSize: 12, fontFamily: FONT, color: d.c, fontWeight: 600 }}>{d.v}</span><span style={{ fontSize: 10, color: C.textDim }}>{d.l}</span></div>)}</div></div><div style={{ background: C.surfaceAlt, borderRadius: 6, padding: "10px 12px" }}><div style={{ fontSize: 10, color: C.textDim, fontFamily: FONT }}>Hyperparams</div><div style={{ fontSize: 11, fontFamily: FONT, color: C.textMuted, marginTop: 4, lineHeight: 1.7 }}>lr0=0.01 {"·"} momentum=0.937<br />augment: mosaic+flip+erasing</div></div><div style={{ background: C.surfaceAlt, borderRadius: 6, padding: "10px 12px" }}><div style={{ fontSize: 10, color: C.textDim, fontFamily: FONT }}>Classes</div><div style={{ marginTop: 4, display: "flex", gap: 4, flexWrap: "wrap" }}>{DATASET.classes.map((cls, i) => <Badge key={cls} color={[C.accent, C.err, C.purple, C.blue, C.warn][i]} bg={[C.accentDim, C.errDim, C.purpleDim, C.blueDim, C.warnDim][i]}>{i}:{cls}</Badge>)}</div></div></div></Card>}

    {/* FSM */}
    {tab === "fsm" && <Card><SectionHeader sub="S = последний бьющий · R = противоположная сторона · timeout = 0.5s">FSM truth table {"·"} tt_fsm_rules_rev_1.xlsx</SectionHeader><FSMTable /><div style={{ marginTop: 16, display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>{[{ label: "Продолжение", color: C.accent, count: 2 }, { label: "Очко S", color: C.warn, count: 3 }, { label: "Очко R", color: C.err, count: 3 }, { label: "Let", color: C.blue, count: 1 }].map(s => <div key={s.label} style={{ background: C.surfaceAlt, borderRadius: 6, padding: "8px 12px", textAlign: "center" }}><div style={{ fontSize: 20, fontWeight: 700, color: s.color, fontFamily: FONT }}>{s.count}</div><div style={{ fontSize: 10, color: C.textMuted, fontFamily: FONT }}>{s.label}</div></div>)}</div><div style={{ marginTop: 16, padding: "12px 14px", background: C.surfaceAlt, borderRadius: 8, borderLeft: `2px solid ${C.warn}` }}><div style={{ fontSize: 11, fontFamily: FONT, fontWeight: 600, color: C.warn, marginBottom: 4 }}>{"Правила ITTF"}</div><div style={{ fontSize: 12, fontFamily: SANS, color: C.textMuted, lineHeight: 1.7 }}>Game до 11 очков (разница {"≥"}2) {"·"} Match best of 5 {"·"} Подача каждые 2 очка {"·"} Деюс 10:10 {"→"} подача каждое очко</div></div></Card>}

    {/* FILES */}
    {tab === "files" && <Card><SectionHeader>Repository structure {"·"} BANGroup/YOLOv8tabletennis-seg</SectionHeader><FileTree /><div style={{ marginTop: 16, display: "flex", gap: 12, flexWrap: "wrap" }}>{[{ dot: C.accent, label: "Main" }, { dot: C.purple, label: "Alt" }, { dot: C.warn, label: "Model" }, { dot: C.blue, label: "Data" }, { dot: C.textMuted, label: "Docs" }, { dot: C.err, label: "Output" }, { dot: C.textDim, label: "Archive" }].map(l => <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, fontFamily: FONT, color: C.textMuted }}><span style={{ width: 6, height: 6, borderRadius: "50%", background: l.dot, display: "inline-block" }} />{l.label}</div>)}</div></Card>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
</script>
</body>
</html>
