<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Projects — albud1978</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #242836;
    --border: #2e3348;
    --text: #e4e6f0;
    --text-dim: #8b8fa8;
    --accent: #6c8aff;
    --accent-glow: rgba(108,138,255,.15);
    --tag-bg: #262a3a;
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  header {
    margin-bottom: 48px;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -.02em;
    margin-bottom: 6px;
  }

  header p {
    color: var(--text-dim);
    font-size: .95rem;
  }

  .sections {}

  .section-block {
    margin-bottom: 40px;
  }

  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: -.01em;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title .sec-icon {
    font-size: 1.1rem;
  }

  .section-title .sec-count {
    font-size: .75rem;
    background: var(--tag-bg);
    padding: 2px 8px;
    border-radius: 6px;
    margin-left: auto;
    font-weight: 500;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: background .2s, border-color .2s, box-shadow .2s;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .card-desc {
    font-size: .85rem;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: auto;
    padding-top: 4px;
  }

  .tag {
    font-size: .7rem;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--tag-bg);
    color: var(--text-dim);
    font-weight: 500;
  }

  .loading, .error-msg {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg) } }

  .error-msg { color: #f06; }

  @media (max-width: 600px) {
    .container { padding: 28px 14px 60px; }
    header h1 { font-size: 1.4rem; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .card { padding: 18px; }
    .section-title { font-size: .95rem; flex-wrap: wrap; }
    .section-title span[style] { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Demo Projects</h1>
    <p>Автоматически собранные проекты из <a href="https://github.com/albud1978/demo" style="color:var(--accent);text-decoration:none">albud1978/demo</a></p>
  </header>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      Загрузка проектов…
    </div>
  </div>
</div>

<script>
const REPO = 'albud1978/demo';
const BRANCH = 'main';
const BASE_URL = `https://albud1978.github.io/demo`;
const API_TREE = `https://api.github.com/repos/${REPO}/git/trees/${BRANCH}?recursive=1`;

const CATEGORY_MAP = {
  ml:   { icon: '🧠', color: '#a78bfa' },
  data: { icon: '📊', color: '#34d399' },
  viz:  { icon: '📈', color: '#fbbf24' },
  qms:  { icon: '📋', color: '#60a5fa' },
  doc:  { icon: '📄', color: '#f472b6' },
};

function categoryStyle(tags) {
  if (!tags || !tags.length) return { icon: '📁', color: '#6c8aff' };
  for (const t of tags) {
    const key = t.toLowerCase();
    if (CATEGORY_MAP[key]) return CATEGORY_MAP[key];
  }
  return { icon: '📁', color: '#6c8aff' };
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchMeta(folder) {
  try {
    const url = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${folder}/meta.json`;
    return await fetchJSON(url);
  } catch {
    return null;
  }
}

async function main() {
  const app = document.getElementById('app');

  try {
    const tree = await fetchJSON(API_TREE);

    const htmlFiles = tree.tree
      .filter(f => f.type === 'blob' && f.path.endsWith('.html') && f.path !== 'index.html')
      .map(f => {
        const parts = f.path.split('/');
        return { folder: parts.slice(0, -1).join('/'), file: parts.at(-1), path: f.path };
      })
      .filter(f => f.folder);

    const folders = [...new Set(htmlFiles.map(f => f.folder))];
    const topLevelFolders = [...new Set(htmlFiles.map(f => f.folder.split('/')[0]))];
    const allFoldersToFetch = [...new Set([...folders, ...topLevelFolders])];
    const metaMap = {};
    await Promise.all(allFoldersToFetch.map(async folder => {
      metaMap[folder] = await fetchMeta(folder);
    }));

    if (!htmlFiles.length) {
      app.innerHTML = '<div class="loading">Проектов пока нет. Добавьте .html файл в подпапку репозитория.</div>';
      return;
    }

    const topFolders = [...new Set(htmlFiles.map(f => f.folder.split('/')[0]))];

    const sections = topFolders.map(topFolder => {
      const files = htmlFiles.filter(f => f.folder.split('/')[0] === topFolder);
      const meta = metaMap[topFolder] || metaMap[files[0]?.folder];
      const sectionName = meta?.name || topFolder;
      const sectionDesc = meta?.description || '';
      const sectionTags = meta?.tags || [];
      const sectionStyle = categoryStyle(sectionTags);

      const visibleFiles = files.filter(f => {
        const fMeta = metaMap[f.folder];
        const fileMeta = fMeta?.files?.[f.file];
        return !fileMeta?.hidden;
      });
      if (!visibleFiles.length) return '';

      const cards = visibleFiles.map(f => {
        const fMeta = metaMap[f.folder];
        const fileMeta = fMeta?.files?.[f.file] || {};
        const title = fileMeta.title || f.file.replace(/\.html$/, '').replace(/[_-]/g, ' ');
        const desc = fileMeta.description || fMeta?.description || '';
        const tags = fileMeta.tags || fMeta?.tags || [];
        const style = categoryStyle(tags);
        const href = `${BASE_URL}/${f.path}`;

        return `<a class="card" href="${href}">
          <div class="card-icon" style="background:${style.color}22;color:${style.color}">${style.icon}</div>
          <div class="card-title">${escHTML(title)}</div>
          ${desc ? `<div class="card-desc">${escHTML(desc)}</div>` : ''}
          ${tags.length ? `<div class="card-tags">${tags.map(t => `<span class="tag">${escHTML(t)}</span>`).join('')}</div>` : ''}
        </a>`;
      });

      return `<div class="section-block">
        <div class="section-title">
          <span class="sec-icon">${sectionStyle.icon}</span>
          ${escHTML(sectionName)}
          ${sectionDesc ? ` <span style="font-weight:400;font-size:.85rem;color:var(--text-dim);opacity:.7">— ${escHTML(sectionDesc)}</span>` : ''}
          <span class="sec-count">${visibleFiles.length}</span>
        </div>
        <div class="grid">${cards.join('')}</div>
      </div>`;
    });

    app.innerHTML = `<div class="sections">${sections.filter(Boolean).join('')}</div>`;

  } catch (err) {
    app.innerHTML = `<div class="error-msg">Не удалось загрузить список проектов.<br><small>${escHTML(err.message)}</small></div>`;
  }
}

function escHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

main();
</script>
</body>
</html>
